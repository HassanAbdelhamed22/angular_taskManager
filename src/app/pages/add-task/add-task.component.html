<div class="add-task-container">
  <div class="add-task-card entrance-animation">
    <div class="add-task-header">
      <div class="header-content">
        <a routerLink="/tasks" class="btn-back">
          <i class="fas fa-arrow-left"></i>
          <span>Back to Tasks</span>
        </a>
        <h1>Create <span class="accent">New Task</span></h1>
        <p class="subtitle">Organize your day and stay productive.</p>
      </div>
      <div class="header-illustration">
        <i class="fas fa-clipboard-list"></i>
      </div>
    </div>

    <form class="add-task-form" (ngSubmit)="handleSubmit()">
      <!-- Primary Details Section -->
      <div class="form-section fade-in-up" style="animation-delay: 0.1s">
        <div class="section-title">
          <i class="fas fa-pen-nib"></i>
          <span>Basic Details</span>
        </div>
        <div class="form-group">
          <label for="title">Task Title</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="What needs to be done?"
            [(ngModel)]="taskData.title"
            required
            #title="ngModel"
            [class.invalid]="title.touched && title.invalid"
          />
          @if (title.touched && title.invalid) {
            <span class="error-msg">A title is required to create a task</span>
          }
        </div>

        <div class="form-group">
          <label for="description">Description (Optional)</label>
          <textarea
            id="description"
            name="description"
            placeholder="Add finer details or sub-tasks..."
            rows="3"
            [(ngModel)]="taskData.description"
          ></textarea>
        </div>
      </div>

      <!-- Settings Section -->
      <div class="form-section fade-in-up" style="animation-delay: 0.2s">
        <div class="section-title">
          <i class="fas fa-sliders-h"></i>
          <span>Classification</span>
        </div>
        
        <div class="form-grid-compact">
          <div class="form-group">
            <label>Priority Level</label>
            <div class="chip-group">
              <button 
                type="button" 
                class="chip low" 
                [class.active]="taskData.priority === 'Low'"
                (click)="taskData.priority = 'Low'"
              >
                <i class="fas fa-circle"></i> Low
              </button>
              <button 
                type="button" 
                class="chip medium" 
                [class.active]="taskData.priority === 'Medium'"
                (click)="taskData.priority = 'Medium'"
              >
                <i class="fas fa-circle"></i> Medium
              </button>
              <button 
                type="button" 
                class="chip high" 
                [class.active]="taskData.priority === 'High'"
                (click)="taskData.priority = 'High'"
              >
                <i class="fas fa-circle"></i> High
              </button>
            </div>
          </div>

          <div class="form-group">
            <label>Category</label>
            <div class="chip-group scrollable">
              @for (cat of ['Work', 'Personal', 'Study']; track cat) {
                <button 
                  type="button" 
                  class="chip category" 
                  [class.active]="taskData.category === cat"
                  (click)="taskData.category = cat"
                >
                  <i [class]="getCategoryIcon(cat)"></i> {{cat}}
                </button>
              }
            </div>
          </div>
        </div>
      </div>

      <!-- Schedule & Metadata Section -->
      <div class="form-section fade-in-up" style="animation-delay: 0.3s">
        <div class="section-title">
          <i class="fas fa-calendar-check"></i>
          <span>Schedule & Tags</span>
        </div>
        <div class="form-grid-compact">
          <div class="form-group">
            <label for="dueDate">Due Date</label>
            <div class="input-with-icon-premium">
              <i class="fas fa-calendar-alt"></i>
              <input type="date" id="dueDate" name="dueDate" [(ngModel)]="taskData.dueDate" />
            </div>
          </div>

          <div class="form-group">
            <label for="tags">Tags</label>
            <div class="input-with-icon-premium">
              <i class="fas fa-tags"></i>
              <input
                type="text"
                id="tags"
                name="tags"
                placeholder="tag1, tag2..."
                [(ngModel)]="taskData.tags"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions-premium fade-in-up" style="animation-delay: 0.4s">
        <button type="button" routerLink="/tasks" class="btn-cancel-premium">
          Discard Changes
        </button>
        <button type="submit" class="btn-submit-premium" [disabled]="!taskData.title">
          <i class="fas fa-paper-plane"></i>
          <span>Create Task</span>
        </button>
      </div>
    </form>
  </div>
</div>
