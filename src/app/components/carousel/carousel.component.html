<div class="carousel-container" (mouseenter)="stopAutoPlay()" (mouseleave)="startAutoPlay()">
  <div class="carousel-slides">
    <div
      *ngFor="let slide of slides; let i = index"
      class="carousel-slide"
      [class.active]="currentIndex() === i"
    >
      <div class="image-overlay"></div>
      <img [src]="slide.image" [alt]="slide.title" />

      <div class="slide-content">
        <h2 class="slide-title entrance-top">{{ slide.title }}</h2>
        <p class="slide-subtitle entrance-bottom">{{ slide.subtitle }}</p>
        <button class="btn-explore entrance-fade" routerLink="/tasks">
          Get Started <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Navigation Arrows -->
  <button class="carousel-btn prev" (click)="prev()" aria-label="Previous">
    <i class="fas fa-chevron-left"></i>
  </button>
  <button class="carousel-btn next" (click)="next()" aria-label="Next">
    <i class="fas fa-chevron-right"></i>
  </button>

  <!-- Indicators -->
  <div class="carousel-indicators">
    <span
      *ngFor="let slide of slides; let i = index"
      class="dot"
      [class.active]="currentIndex() === i"
      (click)="goTo(i)"
    ></span>
  </div>
</div>
