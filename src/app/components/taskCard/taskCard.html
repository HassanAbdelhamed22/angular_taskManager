<div
  class="task-card"
  [class.is-done]="task.isDone"
  [class.priority-border-high]="task.priority === 'High'"
  [class.priority-border-medium]="task.priority === 'Medium'"
  [class.priority-border-low]="task.priority === 'Low'"
>
  <div class="card-left">
    <label class="custom-checkbox">
      <input type="checkbox" [checked]="task.isDone" (change)="toggleDone()" />
      <span class="checkmark">
        <i class="fas fa-check"></i>
      </span>
    </label>
  </div>
  <div class="card-body">
    <h3>{{ task.title }}</h3>
    <p class="description">{{ task.description }}</p>
    <div class="card-meta">
      <span
        class="badge"
        [class.priority-high]="task.priority === 'High'"
        [class.priority-medium]="task.priority === 'Medium'"
        [class.priority-low]="task.priority === 'Low'"
        >{{ task.priority }}</span
      >
      <span class="badge category">{{ task.category }}</span>
      <span class="due-date" *ngIf="task.dueDate"
        ><i class="far fa-calendar"></i> {{ task.dueDate }}</span
      >
    </div>

    <div class="tags-container" *ngIf="getTags().length > 0">
      @for (tag of getTags(); track tag) {
        <span class="badge tag"><i class="fas fa-hashtag"></i> {{ tag }}</span>
      }
    </div>
  </div>
  <div class="icons">
    <button class="btn-edit" title="Edit task" (click)="editTaskFn()">
      <i class="fas fa-pen"></i>
    </button>
    <button class="btn-delete" title="Delete task" (click)="deleteTaskFn()">
      <i class="fas fa-trash-alt"></i>
    </button>
  </div>
</div>
