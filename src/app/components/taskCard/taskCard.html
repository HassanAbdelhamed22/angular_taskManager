<div class="task-card">
  <div class="card-left">
    <input type="checkbox" class="task-checkbox" [checked]="task.isDone" (change)="toggleDone()" />
  </div>
  <div class="card-body">
    <h3>{{ task.title }}</h3>
    <p class="description">{{ task.description }}</p>
    <div class="card-meta">
      <span class="badge priority-high">{{ task.priority }}</span>
      <span class="badge category">{{ task.category }}</span>
      <span class="due-date"><i class="fas fa-calendar"></i> {{ task.dueDate }}</span>
    </div>

    <div class="tags-container">
      @for (tag of getTags(); track tag) {
        <span class="badge tag"><i class="fas fa-hashtag"></i> {{ tag }}</span>
      }
    </div>
  </div>
  <div class="icons">
    <button class="btn-delete" title="Delete task" (click)="deleteTaskFn()">
      <i class="fas fa-trash"></i>
    </button>
    <button class="btn-edit" title="Edit task" (click)="editTaskFn()">
      <i class="fas fa-edit"></i>
    </button>
  </div>
</div>
