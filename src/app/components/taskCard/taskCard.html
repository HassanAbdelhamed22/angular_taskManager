<div class="task-card">
  <div class="card-left">
    <input type="checkbox" class="task-checkbox" />
  </div>
  <div class="card-body">
    <h3>{{ task.title }}</h3>
    <p class="description">{{ task.description }}</p>
    <div class="card-meta">
      <span class="badge priority-high">{{ task.priority }}</span>
      <span class="badge category">{{ task.category }}</span>
      <span class="due-date"><i class="fas fa-calendar"></i> {{ task.dueDate }}</span>
    </div>
  </div>
  <button class="btn-delete" title="Delete task"><i class="fas fa-trash"></i></button>
</div>
