<div
  class="task-card"
  [class.is-done]="task.isDone"
  [class.priority-high]="task.priority === 'High'"
  [class.priority-medium]="task.priority === 'Medium'"
  [class.priority-low]="task.priority === 'Low'"
>
  <div class="card-top-border"></div>
  
  <div class="card-header">
    <label class="circular-checkbox">
      <input type="checkbox" [checked]="task.isDone" (change)="toggleDone()" />
      <span class="checkmark"></span>
    </label>
  </div>

  <div class="card-content">
    <h3 class="task-title">{{ task.title }}</h3>
    
    <div class="badges-row">
      <span class="badge priority-badge" 
        [class.high]="task.priority === 'High'"
        [class.medium]="task.priority === 'Medium'"
        [class.low]="task.priority === 'Low'">
        {{ task.priority }}
      </span>
      
      <span class="badge category-badge">{{ task.category }}</span>
      
      @if (task.tags) {
        @for (tag of getTags(); track tag) {
          <span class="badge tag-badge">{{ tag }}</span>
        }
      }
    </div>
  </div>

  <div class="card-footer">
    <div class="footer-left">
      <span class="due-date" [class.overdue]="isOverdue()">
        <i class="far fa-clock"></i>
        {{ getFormattedDate() }}
      </span>
    </div>
    
    <div class="footer-actions">
      <button class="action-btn edit" (click)="editTaskFn()" title="Edit">
        <i class="fas fa-pen"></i>
      </button>
      <button class="action-btn delete" (click)="deleteTaskFn()" title="Delete">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  </div>
</div>
