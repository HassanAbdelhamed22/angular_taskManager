<div class="tabs">
  <button class="tab-btn" [class.active]="currentFilter === 'all'" (click)="setFilter('all')">
    All <span class="tab-count">{{ allCount }}</span>
  </button>
  <button
    class="tab-btn"
    [class.active]="currentFilter === 'not_done'"
    (click)="setFilter('not_done')"
  >
    Not Done <span class="tab-count">{{ notDoneCount }}</span>
  </button>
  <button class="tab-btn" [class.active]="currentFilter === 'done'" (click)="setFilter('done')">
    Done <span class="tab-count">{{ doneCount }}</span>
  </button>
</div>
