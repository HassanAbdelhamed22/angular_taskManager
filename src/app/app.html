<app-header></app-header>
<main>
  <app-home></app-home>

  @if (isModalOpen) {
    <app-task-input (taskCreated)="addTask($event)" (closeModal)="closeModal()" [taskToEdit]="taskToEdit"> </app-task-input>
  }

  <app-task-list
    [tasks]="tasks"
    (statusChanged)="onStatusChanged($event)"
    (openModal)="openModal()"
    (deleteTask)="deleteTaskFn($event)"
    (editTask)="openEditModal($event)"
  ></app-task-list>
</main>
<app-footer></app-footer>
